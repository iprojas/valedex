<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collection | Valemón Hunt</title>
    <meta name="description" content="Your Valemón Hunt collection progress." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230f8b8d'/%3E%3Cpath d='M18 17h9l6 29 6-29h9L38 52H28L18 17z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script defer src="/js/creatures.js"></script>
    <script defer src="/js/storage.js"></script>
    <script defer src="/js/collection.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <a href="/">Valemón Hunt</a>
          <span class="progress-label" data-progress-label>0 of 5 Valemones captured</span>
        </div>
        <a class="button secondary" href="/">Home</a>
      </header>

      <section class="panel" aria-labelledby="collection-title">
        <h1 id="collection-title">Collection</h1>
        <p class="progress-label" data-progress-label>0 of 5 Valemones captured</p>
        <div class="progress" aria-hidden="true">
          <span data-progress-bar></span>
        </div>
        <a
          class="button complete-link"
          href="/completion.html"
          data-completion-link
          hidden
        >
          Claim reward
        </a>
      </section>

      <section class="panel" aria-label="Valemón collection slots">
        <div class="grid" data-collection-grid></div>
      </section>

      <section class="panel" aria-labelledby="reset-title">
        <h2 id="reset-title">Progress controls</h2>
        <p class="privacy">
          Your collection is saved on this device and browser. Clearing browser
          data will reset your progress.
        </p>
        <button class="danger" type="button" data-reset>Reset collection</button>
      </section>
    </main>
  </body>
</html>
