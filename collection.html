<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Collection | Valemón Hunt</title>
    <meta name="description" content="Your Valemón Hunt collection progress." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230f8b8d'/%3E%3Cpath d='M18 17h9l6 29 6-29h9L38 52H28L18 17z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script defer src="/js/creatures.js"></script>
    <script defer src="/js/storage.js"></script>
    <script defer src="/js/collection.js"></script>
  </head>
  <body>
    <main class="shell collection-shell">
      <header class="collection-header">
        <p class="eyebrow">Valemón Hunt</p>
        <h1>My Collection</h1>
        <p class="progress-label" data-progress-label>0 / 5 collected</p>
        <div class="progress" aria-hidden="true">
          <span data-progress-bar></span>
        </div>
      </header>

      <section class="collection-list" aria-label="Valemón collection" data-collection-grid></section>

      <section class="collection-actions" aria-label="Collection actions">
        <a class="button complete-link" href="/completion.html" data-completion-link hidden>
          Claim reward
        </a>
      </section>
    </main>
  </body>
</html>
