<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Valemón Viewer | Valemón Hunt</title>
    <meta name="description" content="Immersive 3D Valemón viewer with AR." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230f8b8d'/%3E%3Cpath d='M18 17h9l6 29 6-29h9L38 52H28L18 17z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script defer src="/js/creatures.js"></script>
    <script defer src="/js/storage.js"></script>
    <script defer src="/js/viewer.js"></script>
  </head>
  <body class="viewer-body">
    <main class="viewer-screen" aria-label="Full-screen Valemón viewer">
      <a class="viewer-back" href="/" aria-label="Back to collection">Collection</a>
      <div class="viewer-caption">
        <h1 data-viewer-title>Valemón</h1>
        <p data-viewer-rarity></p>
      </div>
      <model-viewer
        id="model-viewer"
        ar
        ar-modes="scene-viewer quick-look"
        camera-controls
        touch-action="pan-y"
        shadow-intensity="2"
        auto-rotate
        disable-pan
        environment-image="neutral"
        skybox-height="2m"
        max-camera-orbit="auto 90deg auto"
      >
        <button slot="ar-button" class="ar-button immersive-ar-button">View in AR</button>
        <div id="error" class="hide">AR is not supported on this device</div>
      </model-viewer>
    </main>
  </body>
</html>
