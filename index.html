<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>3D Model Viewer</title>

  <!-- Official <model-viewer> web component -->
  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
  </script>

  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
    }

    model-viewer {
      width: 100%;
      height: 100dvh;
      min-height: 100vh;
      background: #111;
      --poster-color: transparent;
    }

    #ar-button {
      position: absolute;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      min-height: 48px;
      padding: 0 20px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: #111;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      -webkit-tap-highlight-color: transparent;
    }

    #ar-button:focus-visible {
      outline: 3px solid #8ab4f8;
      outline-offset: 3px;
    }

    #error {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 10;
      max-width: min(90vw, 420px);
      padding: 16px 20px;
      transform: translate3d(-50%, -50%, 0);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      transition: opacity 0.3s ease;
    }

    #error.hide {
      opacity: 0;
      visibility: hidden;
      transition: visibility 2s, opacity 1s 1s;
    }
  </style>
</head>
<body>
  <!--
    Upload these files alongside this page:
      ./assets/model.glb
      ./assets/environment.hdr

    Or replace the paths below with absolute HTTPS URLs.
  -->
  <model-viewer
    id="model-viewer"
    src="./assets/model.glb"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    touch-action="pan-y"
    alt="An interactive 3D model"
    shadow-intensity="2"
    auto-rotate
    disable-pan
    skybox-image="./assets/environment.hdr"
    environment-image="./assets/environment.hdr"
    skybox-height="2m"
    max-camera-orbit="auto 90deg auto"
    loading="eager">

    <button id="ar-button" slot="ar-button" type="button">
      View in your space
    </button>

    <div id="error" class="hide" role="alert">
      AR is not supported on this device.
    </div>
  </model-viewer>

  <script>
    const modelViewer = document.querySelector("#model-viewer");
    const errorMessage = document.querySelector("#error");

    modelViewer.addEventListener("ar-status", (event) => {
      if (event.detail.status !== "failed") return;

      errorMessage.classList.remove("hide");

      window.setTimeout(() => {
        errorMessage.classList.add("hide");
      }, 3000);
    });
  </script>
</body>
</html>
